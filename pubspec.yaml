name: smart_expense_manager
description: "A premium Flutter personal finance application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  cupertino_icons: ^1.0.8
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  google_sign_in: 6.1.5
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^20.1.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  csv: ^7.2.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  lucide_icons: ^0.257.0
  timezone: ^0.10.1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true